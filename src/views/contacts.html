<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="../css/contacts.css">
    <link rel="shortcut icon" href="/public/icons/icon_portfolio.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../css/font-ubuntu.css">
</head>

<body>
    <header id="header-contacts" class="ubuntu-bold">
        <h1>Contact.</h1>
        <nav class="nav-contacts">
            <a href="../../index.html">Return to Home</a>
        </nav>

    </header>

    <main class="main-contacts">
        <div class="form-contacts">
            <form action="#" class="ubuntu-regular">
                <h2>Contact me</h2>
                <input id="form-name" class="ubuntu-regular" type="text" placeholder="Name" required>
                <input id="form-email" class="ubuntu-regular" type="email" placeholder="Email" required>
                <input id="form-comment" class="ubuntu-regular" type="text" placeholder="Comment" required>
                <button id="button" class="ubuntu-regular" type="submit">Send Info</button>
            </form>
        </div>
    </main>


    <footer class="ubuntu-regular" id="footer-contacts">
        <h3>Todos los derechos reservados.</h3>
    </footer>

</body>

</html>
